<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lua UI Engine</title>

<style>
body {
  margin: 0;
  display: flex;
  height: 100vh;
  font-family: monospace;
  background: #0f0f0f;
}

#left {
  width: 50%;
  background: #111;
  padding: 10px;
  box-sizing: border-box;
}

textarea {
  width: 100%;
  height: 90%;
  background: black;
  color: #00ff88;
  border: none;
  outline: none;
  padding: 10px;
}

#right {
  width: 50%;
  background: #1a1a1a;
  position: relative;
  overflow: hidden;
}

.ui-element {
  position: absolute;
  background: #2b2b2b;
  color: white;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  user-select: none;
}
</style>
</head>

<body>

<div id="left">
<h3 style="color:white">Lua Editor</h3>
<textarea id="code">
btn = createButton("Play")
btn:setPosition(100,100)

btn:onClick(function()
  print("Hello from UI!")
end)
</textarea>
</div>

<div id="right"></div>

<script src="https://unpkg.com/fengari-web/dist/fengari-web.js"></script>

<script>
const codeBox = document.getElementById("code");
const right = document.getElementById("right");

let elements = {};
let timeout;

// ================= UI ENGINE =================

function clearUI() {
  right.innerHTML = "";
  elements = {};
}

function createButton(text) {
  const el = document.createElement("div");
  el.className = "ui-element";
  el.innerText = text;

  right.appendChild(el);

  const obj = {
    el,

    setPosition(x, y) {
      el.style.left = x + "px";
      el.style.top = y + "px";
    },

    setText(t) {
      el.innerText = t;
    },

    onClick(fn) {
      el.onclick = fn;
    }
  };

  return obj;
}

// expose to Lua
function runLua(code) {
  clearUI();

  const L = fengari.lauxlib.luaL_newstate();
  fengari.lualib.luaL_openlibs(L);

  fengari.lua.lua_pushjsfunction(L, function(L) {
    const text = fengari.lua.lua_tojsstring(L, 1);
    const btn = createButton(text);

    fengari.lua.lua_pushjsobject(L, btn);
    return 1;
  });

  fengari.lua.lua_setglobal(L, fengari.to_luastring("createButton"));

  fengari.lua.lua_pushjsfunction(L, function(L) {
    console.log(fengari.lua.lua_tojsstring(L, 1));
    return 0;
  });

  fengari.lua.lua_setglobal(L, fengari.to_luastring("print"));

  fengari.lauxlib.luaL_dostring(L, fengari.to_luastring(code));
}

// ================= REALTIME =================

function update() {
  clearTimeout(timeout);
  timeout = setTimeout(() => {
    runLua(codeBox.value);
  }, 300);
}

codeBox.addEventListener("input", update);

// first run
runLua(codeBox.value);
</script>

</body>
</html>
