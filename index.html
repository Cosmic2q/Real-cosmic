<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Tool - UUID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f1f5f9;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Aurora Animation Effect */
        .aurora-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; filter: blur(100px); opacity: 0.45;
        }

        .aurora-layer {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background: radial-gradient(circle at 50% 50%, 
                rgba(16, 185, 129, 0.4) 0%, rgba(59, 130, 246, 0.2) 25%, 
                rgba(139, 92, 246, 0.2) 50%, rgba(15, 23, 42, 0) 100%);
            animation: rotate 25s linear infinite;
        }

        .aurora-layer:nth-child(2) {
            background: radial-gradient(circle at 30% 70%, 
                rgba(6, 182, 212, 0.4) 0%, rgba(16, 185, 129, 0.3) 50%, 
                rgba(15, 23, 42, 0) 100%);
            animation: rotate 18s linear reverse infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .input-style {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.65rem;
            width: 100%;
            font-family: monospace;
            color: #10b981;
            transition: all 0.3s;
        }

        .input-style:focus {
            outline: none; border-color: #10b981; background: rgba(0, 0, 0, 0.5);
        }

        .subpack-item {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid #3b82f6;
            transition: all 0.2s;
        }

        .alert-enter {
            animation: slideDown 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        @keyframes slideDown {
            from { transform: translateY(-120%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        pre::-webkit-scrollbar { width: 4px; height: 4px; }
        pre::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center p-4 md:p-10 relative min-h-screen">

    <div class="aurora-container">
        <div class="aurora-layer"></div>
        <div class="aurora-layer"></div>
    </div>

    <!-- Alert Notification -->
    <div id="success-alert" class="fixed top-5 z-50 hidden pointer-events-none">
        <div class="alert-enter bg-emerald-500/90 backdrop-blur-md text-white px-8 py-3 rounded-2xl shadow-2xl flex items-center space-x-3">
            <span class="font-bold text-sm tracking-tight" id="alert-text">SUCCESS</span>
        </div>
    </div>

    <div class="max-w-6xl w-full space-y-6 relative z-10">
        <header class="text-center space-y-2">
            <!-- ชื่อโปรเจกต์ใหม่: Project Cosmic -->
            <h1 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-cyan-400 to-blue-500 tracking-tighter">
                Project Cosmic
            </h1>
            <!-- คำอธิบายใหม่: UUID V4 GENERATE (ปรับขนาดใหญ่ขึ้น) -->
            <p class="text-slate-400 font-bold tracking-[0.3em] uppercase text-[11px] opacity-90">UUID V4 GENERATE</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            <!-- Settings Column -->
            <div class="lg:col-span-5 space-y-5">
                <div class="glass-card p-6 md:p-8 space-y-5 shadow-2xl">
                    
                    <!-- UUID SECTION -->
                    <div class="grid grid-cols-1 gap-3">
                        <div class="p-3 rounded-xl bg-black/20 border border-white/5 relative group">
                            <label class="text-[8px] font-black text-emerald-500 uppercase tracking-widest block mb-1">Header UUID</label>
                            <p id="display-header" class="text-[11px] font-mono text-emerald-300 truncate">---</p>
                            <button onclick="copyText('uuid-header')" class="absolute top-2 right-3 text-[8px] font-bold text-white/40 hover:text-white transition uppercase">Copy</button>
                        </div>
                        <div class="p-3 rounded-xl bg-black/20 border border-white/5 relative group">
                            <label class="text-[8px] font-black text-cyan-500 uppercase tracking-widest block mb-1">Module UUID</label>
                            <p id="display-module" class="text-[11px] font-mono text-cyan-300 truncate">---</p>
                            <button onclick="copyText('uuid-module')" class="absolute top-2 right-3 text-[8px] font-bold text-white/40 hover:text-white transition uppercase">Copy</button>
                        </div>
                    </div>

                    <!-- CORE CONFIG -->
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <div class="col-span-2">
                                <label class="block text-[9px] font-black text-slate-500 mb-1 tracking-widest uppercase">Project Name (name)</label>
                                <input type="text" id="pack-name" value="name" oninput="updateManifest()" class="input-style text-xs">
                            </div>
                            <div class="col-span-2">
                                <label class="block text-[9px] font-black text-slate-500 mb-1 tracking-widest uppercase">Description (description)</label>
                                <input type="text" id="pack-desc" value="test" oninput="updateManifest()" class="input-style text-xs">
                            </div>
                            <div class="col-span-2">
                                <label class="block text-[9px] font-black text-slate-500 mb-1 tracking-widest uppercase">Module Type</label>
                                <select id="pack-type" onchange="updateManifest()" class="input-style text-xs cursor-pointer appearance-none">
                                    <option value="resources">Resources</option>
                                    <option value="data">Behavior (Data)</option>
                                    <option value="skin_pack">Skin Pack</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[9px] font-black text-slate-500 mb-1 tracking-widest uppercase">Header Version</label>
                                <input type="text" id="pack-ver" value="1.10.1" oninput="updateManifest()" class="input-style text-xs text-center">
                            </div>
                            <div>
                                <label class="block text-[9px] font-black text-slate-500 mb-1 tracking-widest uppercase">Module Version</label>
                                <input type="text" id="module-ver" value="0.0.1" oninput="updateManifest()" class="input-style text-xs text-center">
                            </div>
                        </div>
                    </div>

                    <!-- SUBPACKS SECTION -->
                    <div class="pt-4 border-t border-white/5">
                        <div class="flex justify-between items-center mb-3">
                            <label class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Subpacks Settings</label>
                            <button onclick="addSubpack()" class="text-[9px] font-black bg-blue-500/20 text-blue-300 px-3 py-1 rounded-full hover:bg-blue-500/40 transition">+ Add Subpack</button>
                        </div>
                        <div id="subpacks-container" class="space-y-3 max-h-[180px] overflow-y-auto pr-2 scrollbar-hide">
                            <!-- Dynamic Subpacks Here -->
                        </div>
                    </div>

                    <!-- ปุ่มหลักใหม่: Generate -->
                    <button onclick="generateNewUUIDs()" class="w-full bg-gradient-to-r from-emerald-600 to-cyan-600 hover:from-emerald-500 hover:to-cyan-500 text-white font-black py-4 rounded-xl transition-all shadow-xl active:scale-[0.97] tracking-widest text-sm uppercase">
                        Generate
                    </button>
                </div>
            </div>

            <!-- Code Column -->
            <div class="lg:col-span-7 h-full">
                <div class="glass-card p-1 shadow-2xl overflow-hidden flex flex-col h-full">
                    <div class="flex justify-between items-center p-4 bg-white/5 rounded-t-[22px]">
                        <div class="flex space-x-2 px-1 items-center">
                            <div class="w-2.5 h-2.5 rounded-full bg-red-500/40"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-amber-500/40"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-emerald-500/40"></div>
                            <span class="text-[10px] text-slate-500 font-mono ml-2">manifest.json</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="copyText('manifest-code')" class="text-[9px] font-black bg-white/10 px-4 py-2 rounded-lg hover:bg-white/20 transition uppercase">Copy</button>
                            <button onclick="downloadManifest()" class="text-[9px] font-black bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-400 transition uppercase shadow-lg shadow-blue-500/20">Download</button>
                        </div>
                    </div>
                    <div class="relative flex-grow">
                        <pre id="manifest-code" class="p-8 text-[13px] font-mono overflow-auto text-emerald-400/90 leading-relaxed max-h-[700px] scrollbar-hide"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Storage -->
    <input type="hidden" id="uuid-header">
    <input type="hidden" id="uuid-module">

    <script>
        let subpacks = [
            { folder_name: "name", name: "name", memory_tier: 1 },
            { folder_name: "name", name: "name", memory_tier: 1 }
        ];

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function parseVersion(id) {
            const val = document.getElementById(id).value || "0.0.1";
            return val.split('.').map(n => parseInt(n) || 0);
        }

        function renderSubpackInputs() {
            const container = document.getElementById('subpacks-container');
            container.innerHTML = '';
            subpacks.forEach((sp, index) => {
                const div = document.createElement('div');
                div.className = 'subpack-item p-3 rounded-lg relative space-y-2';
                div.innerHTML = `
                    <div class="grid grid-cols-2 gap-2">
                        <div class="space-y-1">
                             <span class="text-[7px] font-bold text-slate-500 uppercase ml-1">Folder Name</span>
                             <input type="text" placeholder="Folder Name" value="${sp.folder_name}" 
                                oninput="updateSubpack(${index}, 'folder_name', this.value)" 
                                class="input-style text-[10px] py-1.5">
                        </div>
                        <div class="space-y-1">
                             <span class="text-[7px] font-bold text-slate-500 uppercase ml-1">Subpack Name</span>
                             <input type="text" placeholder="Subpack Name" value="${sp.name}" 
                                oninput="updateSubpack(${index}, 'name', this.value)" 
                                class="input-style text-[10px] py-1.5">
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-2">
                            <span class="text-[8px] font-bold text-slate-500 uppercase">Memory Tier:</span>
                            <input type="number" value="${sp.memory_tier}" 
                                oninput="updateSubpack(${index}, 'memory_tier', this.value)" 
                                class="input-style text-[10px] py-1 w-16 text-center">
                        </div>
                        <button onclick="removeSubpack(${index})" class="text-red-400 hover:text-red-300 text-[10px] font-bold">REMOVE</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updateSubpack(index, field, value) {
            subpacks[index][field] = field === 'memory_tier' ? parseInt(value) || 0 : value;
            updateManifest();
        }

        function addSubpack() {
            subpacks.push({ folder_name: "name", name: "name", memory_tier: 1 });
            renderSubpackInputs();
            updateManifest();
        }

        function removeSubpack(index) {
            subpacks.splice(index, 1);
            renderSubpackInputs();
            updateManifest();
        }

        function updateManifest() {
            const h = document.getElementById('uuid-header').value;
            const m = document.getElementById('uuid-module').value;
            const name = document.getElementById('pack-name').value;
            const desc = document.getElementById('pack-desc').value;
            const type = document.getElementById('pack-type').value;
            const version = parseVersion('pack-ver');
            const modVersion = parseVersion('module-ver');

            document.getElementById('display-header').textContent = h;
            document.getElementById('display-module').textContent = m;

            const manifest = {
                "format_version": 2,
                "header": {
                    "description": desc,
                    "name": name,
                    "uuid": h,
                    "version": version,
                    "min_engine_version": [1, 16, 0]
                },
                "modules": [
                    {
                        "description": name,
                        "type": type,
                        "uuid": m,
                        "version": modVersion
                    }
                ],
                "subpacks": subpacks
            };
            document.getElementById('manifest-code').textContent = JSON.stringify(manifest, null, 4);
        }

        function generateNewUUIDs() {
            document.getElementById('uuid-header').value = generateUUID();
            document.getElementById('uuid-module').value = generateUUID();
            updateManifest();
            showAlert("GENERATED & SYNCED");
        }

        function showAlert(text) {
            const alert = document.getElementById('success-alert');
            document.getElementById('alert-text').textContent = text;
            alert.classList.remove('hidden');
            setTimeout(() => alert.classList.add('hidden'), 2500);
        }

        function copyText(id) {
            const inputEl = document.getElementById(id);
            const text = inputEl.tagName === 'INPUT' || inputEl.tagName === 'TEXTAREA' ? inputEl.value : inputEl.textContent;
            
            const ta = document.createElement("textarea");
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showAlert("COPIED TO CLIPBOARD");
        }

        function downloadManifest() {
            const blob = new Blob([document.getElementById('manifest-code').textContent], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'manifest.json';
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        window.onload = () => {
            document.getElementById('uuid-header').value = generateUUID();
            document.getElementById('uuid-module').value = generateUUID();
            renderSubpackInputs();
            updateManifest();
        };
    </script>
</body>
</html>
