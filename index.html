<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reaper Store | Project </title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CodeMirror Core & Theme -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    
    <!-- Markdown & Highlight.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Prompt:wght@300;400;600&display=swap');
        
        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --bg-dark: #020617;
            --panel-bg: rgba(15, 23, 42, 0.65);
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Prompt', sans-serif;
            background-color: var(--bg-dark);
            color: #f1f5f9;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        @media (max-width: 768px) {
            body { padding: 0.5rem; }
            header { flex-direction: column; gap: 1rem; padding: 1rem; }
            #urlInput { width: 100%; }
            .sidebar-panel.active { width: 100%; margin-left: 0; position: fixed; inset: 0; z-index: 60; border-radius: 0; }
        }

        /* --- RGB BACKGROUND LAYER --- */
        .rgb-bg-container {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: -1;
            background: linear-gradient(45deg, #1e1b4b, #065f46, #7c2d12, #581c87, #1e1b4b);
            background-size: 400% 400%;
            animation: gradient-flow 25s ease infinite, color-wave 35s linear infinite;
            will-change: background-position, filter;
        }

        .rgb-glow-ball {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.35;
            z-index: -1;
            will-change: transform;
        }

        .ball-1 { background: #ef4444; top: 10%; left: 10%; animation: move 20s infinite; }
        .ball-2 { background: #3b82f6; bottom: 10%; right: 10%; animation: move 25s infinite reverse; }
        .ball-3 { background: #10b981; top: 40%; right: 20%; animation: move 18s infinite 2s; }

        @keyframes gradient-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes color-wave {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        @keyframes move {
            0% { transform: translate(0, 0); }
            50% { transform: translate(120px, 60px); }
            100% { transform: translate(0, 0); }
        }

        /* --- Smooth Animations for View Switching --- */
        @keyframes loginOut {
            0% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0px); }
            100% { opacity: 0; transform: scale(0.85) translateY(-30px); filter: blur(15px); }
        }
        @keyframes loginIn {
            0% { opacity: 0; transform: scale(0.85) translateY(30px); filter: blur(15px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0px); }
        }
        @keyframes appIn {
            0% { opacity: 0; transform: scale(1.02); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0px); }
        }
        @keyframes appOut {
            0% { opacity: 1; transform: scale(1); filter: blur(0px); }
            100% { opacity: 0; transform: scale(1.02); filter: blur(10px); }
        }

        .anim-login-out { animation: loginOut 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .anim-login-in { animation: loginIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .anim-app-in { animation: appIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .anim-app-out { animation: appOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* --- Glassmorphism & UI --- */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .CodeMirror {
            font-family: 'Fira Code', monospace !important;
            font-size: 14px;
            flex-grow: 1;
            height: 100% !important;
            background: transparent !important;
        }

        .CodeMirror-gutters {
            background: rgba(15, 23, 42, 0.3) !important;
            border-right: 1px solid rgba(255, 255, 255, 0.05) !important;
        }

        .highlight-line {
            background: rgba(59, 130, 246, 0.25) !important;
            border-left: 4px solid var(--primary);
        }

        .sidebar-panel {
            transition: all 0.3s ease;
            width: 0;
            opacity: 0;
            display: none;
        }

        .sidebar-panel.active {
            display: flex;
            width: 450px;
            opacity: 1;
            margin-left: 1rem;
        }

        .chat-input-wrapper {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem;
            padding: 0.5rem;
        }
        
        #chatInput {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 0.5rem 0.75rem;
            resize: none;
            max-height: 150px;
            min-height: 44px;
            font-size: 14px;
            width: 100%;
            line-height: 1.5;
        }

        .msg-user { background: rgba(59, 130, 246, 0.2); border-radius: 1.25rem 1.25rem 0 1.25rem; border: 1px solid rgba(59, 130, 246, 0.3); }
        .msg-ai { background: rgba(30, 41, 59, 0.5); border-radius: 1.25rem 1.25rem 1.25rem 0; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .prose code { background: rgba(0,0,0,0.3); padding: 0.2rem 0.4rem; border-radius: 4px; color: #60a5fa; }
        .prose pre { background: #1a1b26; padding: 1rem; border-radius: 0.75rem; margin: 0.5rem 0; overflow-x: auto; position: relative; }

        .chat-copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255,255,255,0.1);
            color: #94a3b8;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s;
            z-index: 10;
        }
        .chat-copy-btn:hover { background: rgba(255,255,255,0.2); color: white; }

        .input-cyber {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar { width: 8px; height: 8px;}
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col">

    <!-- ================= LOGIN SCREEN ================= -->

    <!-- ================= SYSTEM LOADING SCREEN ================= -->
    <div id="loadingContainer" class="fixed inset-0 z-[110] flex items-center justify-center p-4 hidden">

            <div class="relative w-24 h-24 mb-6">
                <div class="absolute inset-0 rounded-full border-4 border-dashed border-blue-500/20"></div>
                <div class="absolute inset-0 rounded-full border-4 border-t-blue-500 border-r-transparent border-b-indigo-500 border-l-transparent animate-spin" style="animation-duration: 1.2s;"></div>

            <!-- Progress Bar Track -->

                <div id="loadingBar" class="h-full bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full w-0 transition-all duration-300 shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div>

    <!-- ================= MAIN APP ================= -->
    <div id="appContainer" class="hidden flex-col w-full h-full relative z-[50]">

                </div>
                
                <div class="h-6 w-px bg-white/10 mx-1 hidden md:block"></div>
                <button onclick="logout()" class="hidden md:flex items-center gap-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 px-3 py-2 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-all active:scale-95">

                            <i class="fas fa-ghost text-blue-400 text-sm"></i>
                        </div>
                        <h2 class="text-xs font-bold text-white uppercase tracking-widest">Assistant (Groq)</h2>
                    </div>
                    <button onclick="toggleSidebar()" class="text-slate-400 p-2 hover:text-white transition-all"><i class="fas fa-times"></i></button>
                </div>
                
                <div id="chatMessages" class="flex-1 p-4 overflow-y-auto space-y-4 scroll-smooth"></div>

                <div id="aiThinking" class="hidden px-4 py-2 text-[10px] text-blue-400 animate-pulse flex-shrink-0"><i class="fas fa-circle-notch fa-spin mr-2"></i>Thinking...</div>

                <div class="p-4 border-t border-white/5 bg-black/40 flex-shrink-0">
                    <div class="chat-input-wrapper flex items-end gap-2">
                        <textarea id="chatInput" rows="1" placeholder="พิมพ์ข้อความ..." oninput="autoResize(this)"></textarea>
                        <button onclick="sendChatMessage()" class="w-10 h-10 rounded-xl bg-blue-600 hover:bg-blue-500 flex items-center justify-center flex-shrink-0 mb-1 shadow-lg shadow-blue-600/20 transition-all active:scale-95">

        <button onclick="toggleSidebar()" id="chatToggleButton" class="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-2xl shadow-xl flex items-center justify-center z-50 transition-all hover:scale-110 active:scale-95">
            <i class="fas fa-comment-alt"></i>
        </button>

        <div id="confirmModal" class="fixed inset-0 z-[100] flex items-center justify-center hidden p-4">
            <div class="absolute inset-0 bg-black/80 backdrop-blur-md transition-opacity" onclick="closeClearModal()"></div>
            <div class="glass-panel p-8 rounded-[2rem] relative max-w-sm w-full text-center border border-white/10 animate-fade-in">
                <h3 class="text-xl font-bold text-white mb-2">Initialize Purge?</h3>
                <p class="text-slate-300 text-sm mb-8">This will clear the workspace.</p>
                <div class="flex gap-4">
                    <button onclick="closeClearModal()" class="flex-1 py-3 bg-white/5 text-white rounded-xl text-xs font-bold transition-all hover:bg-white/10 border border-white/10">Abort</button>
                    <button onclick="confirmClearCode()" class="flex-1 py-3 bg-red-600 text-white rounded-xl text-xs font-bold transition-all hover:bg-red-500 shadow-lg shadow-red-600/20">Confirm</button>
                </div>
            </div>
        </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/lua/lua.min.js"></script>

    <script>
        // =================================================================
        // ⚙️ ส่วนตั้งค่า Groq API (GROQ API CONFIGURATION)
        // =================================================================
        const GROQ_API_KEY = "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"; // 🔴 กรอก Groq API Key ของคุณที่นี่ (เช่น "gsk_...")
        const GROQ_MODEL = "llama-3.3-70b-versatile"; // 🔴 เลือกโมเดลที่ต้องการ
        
        let chatHistory = [];
        const MAX_HISTORY = 20; // จำกัดจำนวนประวัติแชทล่าสุดเพื่อประหยัด Token

        // --- AUTHENTICATION SYSTEM ---
        const VALID_USER = "ReaperX";
        const VALID_PASS = "RT56JAXZ";

        function checkAuthState() {
            const isLogged = localStorage.getItem('reaper_is_logged_in');
            const loginEl = document.getElementById('loginContainer');
            const appEl = document.getElementById('appContainer');
            const loadingEl = document.getElementById('loadingContainer');

            loginEl.className = "fixed inset-0 z-[100] flex items-center justify-center p-4";
            appEl.className = "hidden flex-col w-full h-full relative z-[50]";
            loadingEl.className = "fixed inset-0 z-[110] flex items-center justify-center p-4 hidden";

            if (isLogged === 'true') {
                loginEl.classList.add('hidden');
                appEl.classList.remove('hidden');
                appEl.classList.add('flex');
                appEl.classList.add('anim-app-in');
                
                setTimeout(() => {
                    editor.refresh();
                    fixEditorLayout();
                }, 150);
            } else {
                loginEl.classList.remove('hidden');
                loginEl.classList.add('anim-login-in');
                setTimeout(() => {
                    const userInput = document.getElementById('loginUser');
                    if (userInput) userInput.focus();
                }, 100);
            }
        }

        function runLoaderSequence(onComplete) {
            const textEl = document.getElementById('loadingText');
            const barEl = document.getElementById('loadingBar');
            
            const steps = [
                { text: "ESTABLISHING REAPER LINK...", progress: 25 },
                { text: "RESOLVING PRIVATE KEY...", progress: 55 },
                { text: "SYNCHRONIZING SECURE CODEX...", progress: 85 },
                { text: "ACCESS GRANTED. BOOT COMPLETE.", progress: 100 }
            ];

            let index = 0;
            barEl.style.width = "0%";
            textEl.textContent = "INITIALIZING CORE...";

            const interval = setInterval(() => {
                if (index < steps.length) {
                    textEl.textContent = steps[index].text;
                    barEl.style.width = steps[index].progress + "%";
                    index++;
                } else {
                    clearInterval(interval);
                    setTimeout(onComplete, 350);
                }
            }, 400);
        }

        function attemptLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if (user === VALID_USER && pass === VALID_PASS) {
                const loginEl = document.getElementById('loginContainer');
                const loadingEl = document.getElementById('loadingContainer');
                const appEl = document.getElementById('appContainer');

                loginEl.className = "fixed inset-0 z-[100] flex items-center justify-center p-4 anim-login-out";

                setTimeout(() => {
                    loginEl.className = "fixed inset-0 z-[100] flex items-center justify-center p-4 hidden";
                    loadingEl.className = "fixed inset-0 z-[110] flex items-center justify-center p-4 anim-login-in";

                    runLoaderSequence(() => {
                        localStorage.setItem('reaper_is_logged_in', 'true');
                        showNotification("Authentication Successful! Welcome back.", true);

                        loadingEl.className = "fixed inset-0 z-[110] flex items-center justify-center p-4 anim-login-out";

                        setTimeout(() => {
                            loadingEl.className = "fixed inset-0 z-[110] flex items-center justify-center p-4 hidden";
                            appEl.className = "flex flex-col w-full h-full relative z-[50] anim-app-in";

                            document.getElementById('loginUser').value = "";
                            document.getElementById('loginPass').value = "";

                            setTimeout(() => {
                                editor.refresh();
                                fixEditorLayout();
                            }, 100);
                        }, 450);
                    });
                }, 450);
                
            } else {
                showNotification("Access Denied: Invalid Credentials.", false);
            }
        }

        function logout() {
            localStorage.removeItem('reaper_is_logged_in');
            showNotification("System Disconnected.", true);
            
            const loginEl = document.getElementById('loginContainer');
            const appEl = document.getElementById('appContainer');

            appEl.className = "flex flex-col w-full h-full relative z-[50] anim-app-out";

            setTimeout(() => {
                appEl.className = "hidden flex-col w-full h-full relative z-[50]";
                loginEl.className = "fixed inset-0 z-[100] flex items-center justify-center p-4 anim-login-in";

                setTimeout(() => {
                    const userInput = document.getElementById('loginUser');
                    if (userInput) userInput.focus();
                }, 100);
            }, 400);
        }

        window.addEventListener('load', checkAuthState);
        // -----------------------------


        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        const editor = CodeMirror.fromTextArea(document.getElementById("codeEditor"), {
            lineNumbers: true,
            theme: "dracula",
            mode: "javascript",
            lineWrapping: true,
            viewportMargin: Infinity
        });

        function showNotification(msg, isSuccess = true) {
            const toast = document.getElementById('toastNotification');
            const toastMsg = document.getElementById('toastMessage');
            toastMsg.textContent = msg;
            
            let baseClasses = "fixed top-6 left-1/2 -translate-x-1/2 z-[250] backdrop-blur-md text-white text-xs font-bold px-5 py-3 rounded-xl border transition-all duration-300 ";
            
            if (isSuccess) {
                toast.className = baseClasses + "bg-emerald-600/90 shadow-[0_10px_40px_rgba(16,185,129,0.3)] border-emerald-500/20";
            } else {
                toast.className = baseClasses + "bg-red-600/90 shadow-[0_10px_40px_rgba(239,68,68,0.3)] border-red-500/20";
            }
            
            toast.classList.remove('hidden');
            void toast.offsetWidth;
            toast.classList.remove('scale-95', 'opacity-0');
            toast.classList.add('scale-100', 'opacity-100', '-translate-y-2');
            
            setTimeout(() => {
                toast.classList.remove('scale-100', 'opacity-100', '-translate-y-2');
                toast.classList.add('scale-95', 'opacity-0');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 3000);
        }

        function fixEditorLayout() {
            if (editor.getWrapperElement().offsetParent !== null) { editor.refresh(); }
        }

        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            const b = document.getElementById('chatToggleButton');
            const isActive = s.classList.toggle('active');
            b.style.display = isActive ? 'none' : 'flex';
            setTimeout(fixEditorLayout, 350);
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
        }

        async function fetchCode() {
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();
            if (!url) return;
            
            try {
                showNotification("กำลังสตรีมโค้ดเข้าระบบ...");
                editor.setValue("");
                
                const res = await fetch(url);
                if (!res.ok) throw new Error("Network Response Fail");
                
                const reader = res.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    fullText += decoder.decode(value, { stream: true });
                    
                    await new Promise(resolve => {
                        requestAnimationFrame(() => {
                            editor.setValue(fullText);
                            editor.setCursor(editor.lineCount(), 0);
                            resolve();
                        });
                    });
                }
                
                fixEditorLayout();
                editor.setCursor(0, 0);
                showNotification("โหลดโค้ดสำเร็จเรียบร้อยแล้ว!", true);
            } catch (e) { 
                showNotification("ไม่สามารถดึงข้อมูลโค้ดจาก URL ดังกล่าวได้", false);
            }
        }

        let activeLineHandle = null;
        function goToLine() {
            const input = document.getElementById('lineSearchInput');
            const lineNum = parseInt(input.value);
            if (isNaN(lineNum) || lineNum < 1 || lineNum > editor.lineCount()) {
                showNotification("ไม่พบบรรทัดที่ระบุในไฟล์นี้", false);
                return;
            }
            const targetLine = lineNum - 1;
            if (activeLineHandle !== null) { editor.removeLineClass(activeLineHandle, "background", "highlight-line"); }
            editor.setCursor({line: targetLine, ch: 0});
            editor.focus();
            const h = editor.getScrollInfo().clientHeight;
            const coords = editor.charCoords({line: targetLine, ch: 0}, "local");
            editor.scrollTo(null, (coords.top + coords.bottom) / 2 - (h / 2));
            activeLineHandle = editor.addLineClass(targetLine, "background", "highlight-line");
            setTimeout(() => {
                if (activeLineHandle !== null) {
                    editor.removeLineClass(activeLineHandle, "background", "highlight-line");
                    activeLineHandle = null;
                }
            }, 5000);
        }

        function downloadCode() {
            const text = editor.getValue();
            if (!text) {
                showNotification("ไม่มีเนื้อหาโค้ดให้ดาวน์โหลด", false);
                return;
            }
            const blob = new Blob([text], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `reaper_export_${Date.now()}.txt`;
            a.click();
            window.URL.revokeObjectURL(url);
            showNotification("เตรียมไฟล์ดาวน์โหลดเรียบร้อย!");
        }

        function copyCode() {
            const text = editor.getValue();
            if (!text) {
                showNotification("ไม่มีเนื้อหาโค้ดให้คัดลอก", false);
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showNotification("คัดลอกโค้ดทั้งหมดลงคลิปบอร์ดแล้ว!");
            });
        }

        function showClearModal() { document.getElementById('confirmModal').classList.remove('hidden'); }
        function closeClearModal() { document.getElementById('confirmModal').classList.add('hidden'); }
        function confirmClearCode() { 
            editor.setValue(""); 
            closeClearModal(); 
            fixEditorLayout(); 
            showNotification("ล้างพื้นที่ทำงานเรียบร้อย");
        }

        // =================================================================
        // 📡 ฟังก์ชันส่งแชทโดยเชื่อมต่อไปยัง Groq API
        // =================================================================
        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            const currentCode = editor.getValue();
            if (!text) return;

            // ตรวจสอบเบื้องต้นว่าผู้ใช้ได้กรอก API Key หรือยัง
            if (!GROQ_API_KEY) {
                appendMessage('ai', "🚨 แจ้งเตือน: กรุณากรอก `GROQ_API_KEY` ที่ต้นสคริปต์ในโค้ดก่อนเริ่มต้นใช้งานระบบผู้ช่วยแชท");
                input.value = '';
                return;
            }

            appendMessage('user', text);
            input.value = '';
            input.style.height = 'auto';
            chatHistory.push({ role: "user", content: text });

            const thinking = document.getElementById('aiThinking');
            thinking.classList.remove('hidden');
            scrollToBottom();

            const systemPrompt = `คุณคือ Reaper Assistant
            1. เข้าประเด็นทันที (Direct to the point) ห้ามแนะนำตัวหรือทักทายซ้ำซ้อน
            2. ตอบคำถามหรือแก้ไขโค้ดตามคำสั่งโดยไม่ต้องมีเกริ่นนำที่ยืดยาว
            3. สุภาพแต่เป็นกันเองและเน้นความรวดเร็ว
            4. หากผู้ใช้ถามเรื่องเทคนิค ให้เน้นความถูกต้องและ Optimized
            5. ใช้ Markdown และ Highlight โค้ดให้สวยงามเสมอ`;

            // จัดโครงสร้างข้อความเพื่อส่งเข้า Groq API (OpenAI Format)
            const formattedMessages = [
                { role: "system", content: systemPrompt }
            ];

            // วนลูปดึงประวัติแชทย้อนหลังแบบคัดกรองคู่สนทนา
            chatHistory.slice(-MAX_HISTORY).forEach((msg, idx, arr) => {
                // หากเป็นคิวข้อความสุดท้ายของผู้ใช้ ให้ส่งบริบทของ Editor แนบไปด้วย
                if (idx === arr.length - 1 && msg.role === 'user') {
                    formattedMessages.push({
                        role: "user",
                        content: `[Current Codex Context]\n${currentCode || "Empty"}\n\n[User Input]\n${msg.content}`
                    });
                } else {
                    formattedMessages.push({
                        role: msg.role === 'model' ? 'assistant' : msg.role,
                        content: msg.content
                    });
                }
            });

            const payload = {
                model: GROQ_MODEL,
                messages: formattedMessages,
                temperature: 0.5,
                max_tokens: 4096
            };

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                thinking.classList.add('hidden');

                if (data.error) {
                    appendMessage('ai', `🚨 Groq API Error: ${data.error.message}`);
                    return;
                }

                const aiResponse = data.choices?.[0]?.message?.content || "ระบบไม่สามารถดึงข้อมูลคำตอบได้";
                chatHistory.push({ role: "model", content: aiResponse });
                appendAiMessage(aiResponse);
            } catch (err) {
                thinking.classList.add('hidden');
                appendMessage('ai', "เกิดข้อผิดพลาด: ไม่สามารถทำการเชื่อมต่อโครงข่ายกับ Groq API ได้ กรุณาตรวจสอบอินเทอร์เน็ตหรือความถูกต้องของ API Key");
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `flex flex-col ${role === 'user' ? 'items-end' : 'items-start'} mb-4`;
            div.innerHTML = `<div class="${role === 'user' ? 'msg-user' : 'msg-ai'} px-5 py-3.5 text-[14px] text-white max-w-[90%] whitespace-pre-wrap">${text}</div>`;
            document.getElementById('chatMessages').appendChild(div);
            scrollToBottom();
        }

        function appendAiMessage(md) {
            const div = document.createElement('div');
            div.className = 'flex flex-col items-start w-full mb-4';
            const bubble = document.createElement('div');
            bubble.className = 'msg-ai prose prose-invert px-5 py-4 text-[14px] text-slate-200 w-full max-w-[95%] leading-relaxed';
            
            bubble.innerHTML = marked.parse(md);
            
            bubble.querySelectorAll('pre').forEach(pre => {
                const btn = document.createElement('button');
                btn.className = 'chat-copy-btn';
                btn.innerHTML = '<i class="far fa-copy mr-1"></i> Copy';
                btn.onclick = () => {
                    const codeText = pre.querySelector('code').innerText;
                    navigator.clipboard.writeText(codeText).then(() => {
                        btn.innerHTML = '<i class="fas fa-check text-green-400 mr-1"></i> Copied';
                        setTimeout(() => btn.innerHTML = '<i class="far fa-copy mr-1"></i> Copy', 2000);
                    });
                };
                pre.appendChild(btn);
            });

            div.appendChild(bubble);
            document.getElementById('chatMessages').appendChild(div);
            scrollToBottom();
            bubble.querySelectorAll('pre code').forEach((block) => { hljs.highlightElement(block); });
        }

        function scrollToBottom() {
            const chat = document.getElementById('chatMessages');
            requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
        }

        editor.on("change", (cm) => {
            document.getElementById('lineCount').textContent = `REAPER CODEX | ${cm.lineCount()} LINES`;
        });

        document.getElementById('lineSearchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') goToLine();
        });

        window.addEventListener('resize', fixEditorLayout);
    </script>
</body>
</html>
